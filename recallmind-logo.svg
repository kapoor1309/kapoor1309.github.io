<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" width="480" height="240" role="img" aria-label="RecallMind">
  <defs>
    <linearGradient id="rm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#7c6cff"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#bcd4ff"/>
      <stop offset="1" stop-color="#4f8cff"/>
    </radialGradient>
  </defs>

  <!-- recall loop: near-complete ring (ReAct cycle) with a small gap at top -->
  <circle cx="240" cy="104" r="46" fill="none" stroke="url(#rm)" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="264 25"
          transform="rotate(-77 240 104)"/>
  <!-- arrowhead at the gap, implying the cycle turning over -->
  <path d="M236 56 L251 50 L250 66 Z" fill="url(#rm)"/>

  <!-- memory graph nested inside: central reasoning node + stored past-thought nodes -->
  <g stroke="url(#rm)" stroke-width="2.6" stroke-linecap="round">
    <line x1="240" y1="108" x2="221" y2="97"/>
    <line x1="240" y1="108" x2="261" y2="100"/>
    <line x1="240" y1="108" x2="236" y2="130"/>
  </g>
  <circle cx="221" cy="97" r="4.2" fill="#7c6cff"/>
  <circle cx="261" cy="100" r="4.2" fill="#7c6cff"/>
  <circle cx="236" cy="130" r="4.2" fill="#7c6cff"/>
  <circle cx="240" cy="108" r="8" fill="url(#node)"/>

  <!-- wordmark -->
  <text x="240" y="196" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700"
        letter-spacing="3" text-anchor="middle">
    <tspan fill="#c3ccdb">Recall</tspan><tspan fill="url(#rm)">Mind</tspan>
  </text>
</svg>
